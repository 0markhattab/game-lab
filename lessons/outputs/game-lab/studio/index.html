<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Studio · GAME LAB</title>
<link rel="stylesheet" href="../shared.css">
<style>
  html, body { height: 100%; overflow: hidden; }
  body {
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }
  body::before { display: none; } /* kill the blueprint grid in studio for cleaner look */

  .studio-bar {
    flex-shrink: 0;
    background: var(--bg-elev);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.6rem 1rem;
    flex-wrap: wrap;
  }
  .studio-bar .brand {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--text);
    margin-right: 0.5rem;
    text-decoration: none;
  }
  .studio-bar .brand .dot {
    width: 9px; height: 9px;
    background: var(--lime);
    border-radius: 2px;
    box-shadow: 0 0 10px var(--lime);
    animation: pulse 1.6s ease-in-out infinite;
  }
  .studio-bar a { text-decoration: none; }
  .studio-bar select,
  .studio-bar input[type="text"] {
    background: var(--bg-soft);
    border: 1px solid var(--line-bright);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.78rem;
    padding: 0.4rem 0.6rem;
    border-radius: 4px;
    outline: none;
  }
  .studio-bar select:focus,
  .studio-bar input:focus { border-color: var(--lime); }
  .studio-bar .label {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    color: var(--text-mute);
    letter-spacing: 0.12em;
    margin-right: 0.2rem;
  }
  .studio-bar .spacer { flex: 1; }
  .studio-bar .btn { padding: 0.4rem 0.85rem; font-size: 0.74rem; }

  .studio-main {
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--line);
  }
  @media (max-width: 900px) {
    .studio-main { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
  }
  .pane {
    background: var(--bg-elev);
    display: flex;
    flex-direction: column;
    min-height: 0;
    min-width: 0;
  }
  .pane-head {
    padding: 0.55rem 0.9rem;
    background: var(--bg-soft);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .pane-head .dots { display: flex; gap: 0.3rem; }
  .pane-head .dots span { width: 9px; height: 9px; border-radius: 50%; background: var(--line-bright); }
  .pane-head .dots span:nth-child(1) { background: var(--red); }
  .pane-head .dots span:nth-child(2) { background: var(--amber); }
  .pane-head .dots span:nth-child(3) { background: var(--lime); }

  #editor {
    flex: 1;
    background: #07091a;
    color: #d8def0;
    border: none;
    outline: none;
    font-family: var(--font-mono);
    font-size: 0.86rem;
    line-height: 1.65;
    padding: 1rem 1.1rem;
    resize: none;
    width: 100%;
    tab-size: 2;
    white-space: pre;
    overflow: auto;
  }

  #preview {
    flex: 1;
    width: 100%;
    border: none;
    background: #fff;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-card);
    border: 1px solid var(--lime);
    color: var(--lime);
    font-family: var(--font-mono);
    font-size: 0.8rem;
    padding: 0.6rem 1.2rem;
    border-radius: 6px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 200;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(-6px);
  }

  .help {
    position: fixed;
    bottom: 16px;
    right: 16px;
    background: var(--bg-card);
    border: 1px solid var(--line-bright);
    border-radius: var(--radius);
    padding: 0.8rem 1rem;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--text-dim);
    z-index: 100;
    max-width: 240px;
    line-height: 1.7;
  }
  .help kbd {
    background: var(--bg-soft);
    border: 1px solid var(--line-bright);
    border-bottom-width: 2px;
    border-radius: 3px;
    padding: 1px 5px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.7rem;
  }
  .help .close {
    float: right;
    background: none;
    border: none;
    color: var(--text-mute);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.9rem;
    margin-left: 0.5rem;
    margin-top: -2px;
  }
  .help .close:hover { color: var(--lime); }
</style>
</head>
<body>

<div class="studio-bar">
  <a class="brand" href="../index.html"><span class="dot"></span>GAME_LAB <span style="color:var(--text-mute);font-weight:400;">/ studio</span></a>

  <span class="label">template</span>
  <select id="template-select">
    <option value="blank">blank canvas</option>
    <option value="bouncing">bouncing ball</option>
    <option value="topdown">top-down mover</option>
    <option value="geometry-dash">geometry dash starter</option>
    <option value="snake">snake starter</option>
    <option value="breakout">breakout starter</option>
    <option value="platformer">platformer starter</option>
    <option value="particles">particle fountain</option>
  </select>

  <span class="label" style="margin-left: 0.6rem;">project</span>
  <input type="text" id="project-name" placeholder="untitled" style="width: 130px;">
  <button class="btn btn-secondary" id="save-btn">Save</button>
  <select id="load-select" style="width: 130px;">
    <option value="">— load —</option>
  </select>

  <span class="spacer"></span>

  <button class="btn btn-secondary" id="download-btn">↓ Download</button>
  <button class="btn" id="run-btn">▶ Run  (⌘↵)</button>
</div>

<div class="studio-main">
  <div class="pane">
    <div class="pane-head">
      <span>game.js</span>
      <div class="dots"><span></span><span></span><span></span></div>
    </div>
    <textarea id="editor" spellcheck="false"></textarea>
  </div>
  <div class="pane">
    <div class="pane-head">
      <span id="preview-status">preview · 720 × 440</span>
      <div class="dots"><span></span><span></span><span></span></div>
    </div>
    <iframe id="preview" sandbox="allow-scripts"></iframe>
  </div>
</div>

<div class="toast" id="toast">Saved.</div>

<div class="help" id="help">
  <button class="close" id="help-close">×</button>
  <strong style="color:var(--lime);">controls</strong><br>
  <kbd>⌘</kbd> + <kbd>↵</kbd> &nbsp;run<br>
  <kbd>Tab</kbd> indent<br>
  Click in preview, then use <kbd>WASD</kbd>, <kbd>↑↓←→</kbd>, mouse, <kbd>Space</kbd>.
</div>

<script>
// ============================================================
// GAME LAB · STUDIO
// ============================================================

const CANVAS_W = 720;
const CANVAS_H = 440;

// ----- Templates -----
// Each template is a complete, runnable game starter that fits
// the canvas + game-loop scaffold. Students can load, edit, run.
const TEMPLATES = {

blank:
`// === blank canvas =============================================
// Available globals:
//   canvas, ctx           — the drawing surface
//   W, H                  — canvas size (${CANVAS_W} x ${CANVAS_H})
//   keys                  — { 'ArrowLeft': true, 'KeyA': true, ... }
//   mouse                 — { x, y, down }
//
// Press Cmd/Ctrl + Enter to run.

function update() {
  // game logic goes here
}

function draw() {
  // clear the canvas
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0, 0, W, H);

  // draw something
  ctx.fillStyle = '#9eff5a';
  ctx.fillRect(W/2 - 25, H/2 - 25, 50, 50);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
`,

bouncing:
`// === bouncing ball ============================================
// A ball that bounces off the walls. The classic.

const ball = {
  x: W / 2, y: H / 2,
  vx: 4, vy: 3,
  r: 18
};

function update() {
  ball.x += ball.vx;
  ball.y += ball.vy;
  if (ball.x - ball.r < 0 || ball.x + ball.r > W) ball.vx *= -1;
  if (ball.y - ball.r < 0 || ball.y + ball.r > H) ball.vy *= -1;
}

function draw() {
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#9eff5a';
  ctx.shadowColor = '#9eff5a';
  ctx.shadowBlur = 20;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
`,

topdown:
`// === top-down mover ===========================================
// WASD or arrow keys move the player around. No gravity.

const player = { x: W/2, y: H/2, size: 28, speed: 4 };

function update() {
  if (keys.ArrowLeft  || keys.KeyA) player.x -= player.speed;
  if (keys.ArrowRight || keys.KeyD) player.x += player.speed;
  if (keys.ArrowUp    || keys.KeyW) player.y -= player.speed;
  if (keys.ArrowDown  || keys.KeyS) player.y += player.speed;

  // Stay on screen
  player.x = Math.max(player.size/2, Math.min(W - player.size/2, player.x));
  player.y = Math.max(player.size/2, Math.min(H - player.size/2, player.y));
}

function draw() {
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0, 0, W, H);

  // grid
  ctx.strokeStyle = 'rgba(35,44,74,0.6)';
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // player
  ctx.fillStyle = '#9eff5a';
  ctx.shadowColor = '#9eff5a';
  ctx.shadowBlur = 16;
  ctx.fillRect(player.x - player.size/2, player.y - player.size/2,
               player.size, player.size);
  ctx.shadowBlur = 0;
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
`,

'geometry-dash':
`// === geometry dash starter ====================================
// A simple jumping cube. TODO: add scrolling spikes & death.

const player = { x: 100, y: H - 40, vy: 0, size: 24, onGround: true };
const ground = H - 28;
const gravity = 0.7;
const jumpV   = -12;

let scrollX = 0;
const speed = 4;

function update() {
  // gravity + jump
  player.vy += gravity;
  player.y  += player.vy;
  if (player.y + player.size/2 >= ground) {
    player.y = ground - player.size/2;
    player.vy = 0;
    player.onGround = true;
  }
  if ((keys[' '] || keys.ArrowUp) && player.onGround) {
    player.vy = jumpV;
    player.onGround = false;
  }
  scrollX += speed;

  // TODO: spawn scrolling spikes, check collision, end game
}

function draw() {
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0, 0, W, H);

  // ground line
  ctx.strokeStyle = '#9eff5a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, ground); ctx.lineTo(W, ground); ctx.stroke();

  // moving stripes on ground (parallax fakeout)
  ctx.strokeStyle = 'rgba(158,255,90,0.2)';
  for (let x = -((scrollX * 1.5) % 32); x < W; x += 32) {
    ctx.beginPath();
    ctx.moveTo(x, ground); ctx.lineTo(x - 14, H);
    ctx.stroke();
  }

  // player
  ctx.fillStyle = '#9eff5a';
  ctx.shadowColor = '#9eff5a';
  ctx.shadowBlur = 16;
  ctx.fillRect(player.x - player.size/2, player.y - player.size/2,
               player.size, player.size);
  ctx.shadowBlur = 0;
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
`,

snake:
`// === snake starter ============================================
// Grid-based. TODO: add food, growing tail, collision.

const CELL = 20;
const COLS = Math.floor(W / CELL);
const ROWS = Math.floor(H / CELL);

let snake = [{x: 5, y: 5}, {x: 6, y: 5}, {x: 7, y: 5}];
let dir = { x: 1, y: 0 };
let lastTick = 0;

window.addEventListener('keydown', e => {
  if (e.code === 'ArrowLeft'  && dir.x !== 1)  dir = { x:-1, y: 0 };
  if (e.code === 'ArrowRight' && dir.x !== -1) dir = { x: 1, y: 0 };
  if (e.code === 'ArrowUp'    && dir.y !== 1)  dir = { x: 0, y:-1 };
  if (e.code === 'ArrowDown'  && dir.y !== -1) dir = { x: 0, y: 1 };
});

function tick() {
  const head = snake[snake.length - 1];
  snake.push({ x: head.x + dir.x, y: head.y + dir.y });
  snake.shift();
  // TODO: add food, grow on eat, detect self-collision and walls
}

function draw() {
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0, 0, W, H);

  // snake
  ctx.fillStyle = '#9eff5a';
  for (const s of snake) {
    ctx.fillRect(s.x * CELL + 1, s.y * CELL + 1, CELL - 2, CELL - 2);
  }
}

function loop(now) {
  if (now - lastTick > 130) { lastTick = now; tick(); }
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
`,

breakout:
`// === breakout starter =========================================
// Paddle + ball. TODO: add bricks!

const paddle = { x: W/2 - 60, y: H - 24, w: 120, h: 12, speed: 7 };
const ball   = { x: W/2, y: H/2, vx: 4, vy: -3.5, r: 7 };

function update() {
  if (keys.ArrowLeft  || keys.KeyA) paddle.x -= paddle.speed;
  if (keys.ArrowRight || keys.KeyD) paddle.x += paddle.speed;
  paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));

  ball.x += ball.vx;
  ball.y += ball.vy;
  if (ball.x - ball.r < 0 || ball.x + ball.r > W) ball.vx *= -1;
  if (ball.y - ball.r < 0) ball.vy *= -1;

  // paddle bounce
  if (ball.y + ball.r > paddle.y && ball.y < paddle.y + paddle.h &&
      ball.x > paddle.x && ball.x < paddle.x + paddle.w && ball.vy > 0) {
    ball.vy *= -1;
    // steer based on hit position
    const hit = (ball.x - (paddle.x + paddle.w/2)) / (paddle.w/2);
    ball.vx = hit * 5;
  }

  // bottom = reset
  if (ball.y > H) { ball.x = W/2; ball.y = H/2; ball.vx = 4; ball.vy = -3.5; }

  // TODO: build a 2D array of bricks. Detect ball-vs-brick collision
  // and remove bricks on hit.
}

function draw() {
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#9eff5a';
  ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);

  ctx.beginPath();
  ctx.fillStyle = '#fff';
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fill();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
`,

platformer:
`// === platformer starter =======================================
// One platform, one player. TODO: add more platforms + coins.

const player = { x: 80, y: 200, w: 28, h: 32, vx: 0, vy: 0, onGround: false };
const platforms = [
  { x: 0, y: H - 30, w: W, h: 30 },              // ground
  { x: 200, y: H - 110, w: 140, h: 14 },         // floating block
  { x: 420, y: H - 180, w: 140, h: 14 },         // higher block
];

const GRAVITY = 0.6;
const SPEED   = 4;
const JUMP_V  = -12;

function overlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

function update() {
  player.vx = 0;
  if (keys.ArrowLeft  || keys.KeyA) player.vx = -SPEED;
  if (keys.ArrowRight || keys.KeyD) player.vx =  SPEED;

  if ((keys[' '] || keys.ArrowUp || keys.KeyW) && player.onGround) {
    player.vy = JUMP_V;
    player.onGround = false;
  }

  player.vy += GRAVITY;

  // x-axis
  player.x += player.vx;
  for (const p of platforms) {
    if (overlap(player, p)) {
      if (player.vx > 0) player.x = p.x - player.w;
      else if (player.vx < 0) player.x = p.x + p.w;
    }
  }

  // y-axis
  player.y += player.vy;
  player.onGround = false;
  for (const p of platforms) {
    if (overlap(player, p)) {
      if (player.vy > 0) { player.y = p.y - player.h; player.onGround = true; }
      else if (player.vy < 0) player.y = p.y + p.h;
      player.vy = 0;
    }
  }
}

function draw() {
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0, 0, W, H);

  for (const p of platforms) {
    ctx.fillStyle = '#1d2540';
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.fillStyle = '#9eff5a';
    ctx.fillRect(p.x, p.y, p.w, 2);
  }

  ctx.fillStyle = '#9eff5a';
  ctx.shadowColor = '#9eff5a';
  ctx.shadowBlur = 14;
  ctx.fillRect(player.x, player.y, player.w, player.h);
  ctx.shadowBlur = 0;
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
`,

particles:
`// === particle fountain ========================================
// Click in the canvas to spray particles. Just for vibes.

const particles = [];

function spawn(x, y) {
  for (let i = 0; i < 8; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: -2 - Math.random() * 5,
      life: 60 + Math.random() * 40,
      hue: Math.random() * 360,
      size: 2 + Math.random() * 3
    });
  }
}

// auto-spawn at the mouse position when held
function update() {
  if (mouse.down) spawn(mouse.x, mouse.y);

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.18;       // gravity
    p.life--;
    if (p.life <= 0 || p.y > H) particles.splice(i, 1);
  }
}

function draw() {
  // fade trail by drawing semi-transparent black
  ctx.fillStyle = 'rgba(10, 14, 26, 0.18)';
  ctx.fillRect(0, 0, W, H);

  for (const p of particles) {
    ctx.fillStyle = \`hsla(\${p.hue}, 90%, 60%, \${Math.min(1, p.life / 40)})\`;
    ctx.fillRect(p.x, p.y, p.size, p.size);
  }

  // hint
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '12px monospace';
  ctx.fillText('click + hold to spray', 14, 22);
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
`
};

// ----- DOM refs -----
const editor       = document.getElementById('editor');
const preview      = document.getElementById('preview');
const runBtn       = document.getElementById('run-btn');
const tplSel       = document.getElementById('template-select');
const projInput    = document.getElementById('project-name');
const saveBtn      = document.getElementById('save-btn');
const loadSel      = document.getElementById('load-select');
const dlBtn        = document.getElementById('download-btn');
const toast        = document.getElementById('toast');
const helpEl       = document.getElementById('help');
const helpClose    = document.getElementById('help-close');

// ----- Build the iframe srcdoc that wraps user code -----
function buildPreview(code) {
  return `<!doctype html><html><head><meta charset="utf-8"><style>
    html, body { margin: 0; padding: 0; background: #0a0e1a; color: #e8eaf2;
      font-family: system-ui, sans-serif; display: flex; align-items: center;
      justify-content: center; min-height: 100vh; overflow: hidden; }
    canvas { background: #11172a; border: 1px solid #232c4a; border-radius: 8px;
      display: block; box-shadow: 0 0 60px rgba(158,255,90,0.12);
      max-width: 96vw; max-height: 92vh; }
    .err { position: fixed; left: 12px; top: 12px; right: 12px;
      background: #3a0f15; color: #ff8a96; padding: 10px 14px;
      border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 12px;
      border: 1px solid #ff5a6a; display: none; white-space: pre-wrap;
      z-index: 999; }
  </style></head><body>
    <canvas id="canvas" width="${CANVAS_W}" height="${CANVAS_H}"></canvas>
    <div id="err" class="err"></div>
    <script>
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;
      const keys = {};
      const mouse = { x: 0, y: 0, down: false };
      window.addEventListener('keydown', e => {
        keys[e.key] = true; keys[e.code] = true;
        if (['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
      });
      window.addEventListener('keyup', e => {
        keys[e.key] = false; keys[e.code] = false;
      });
      canvas.addEventListener('mousemove', e => {
        const r = canvas.getBoundingClientRect();
        mouse.x = (e.clientX - r.left) * (canvas.width / r.width);
        mouse.y = (e.clientY - r.top)  * (canvas.height / r.height);
      });
      canvas.addEventListener('mousedown', () => mouse.down = true);
      canvas.addEventListener('mouseup',   () => mouse.down = false);
      canvas.addEventListener('mouseleave',() => mouse.down = false);
      canvas.tabIndex = 0;  // can receive keyboard focus
      canvas.focus();
      window.onerror = function(msg, src, line, col) {
        const el = document.getElementById('err');
        el.style.display = 'block';
        el.textContent = 'Error (line ' + (line - 1) + '): ' + msg;
        return true;
      };
      try {
${code}
      } catch(e) {
        const el = document.getElementById('err');
        el.style.display = 'block';
        el.textContent = 'Error: ' + e.message;
      }
    <\/script>
  </body></html>`;
}

function run() {
  preview.srcdoc = buildPreview(editor.value);
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1500);
}

// ----- Templates -----
function loadTemplate(name) {
  if (!TEMPLATES[name]) name = 'blank';
  editor.value = TEMPLATES[name];
  tplSel.value = name;
  projInput.value = '';
  run();
}

tplSel.addEventListener('change', () => loadTemplate(tplSel.value));

// ----- LocalStorage save / load -----
const LS_KEY = 'gamelab.studio.projects';

function readProjects() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; }
  catch { return {}; }
}
function writeProjects(p) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(p)); }
  catch(e) { showToast('Storage unavailable'); }
}
function refreshLoadList() {
  const projects = readProjects();
  const names = Object.keys(projects).sort();
  loadSel.innerHTML = '<option value="">— load —</option>' +
    names.map(n => `<option value="${n}">${n}</option>`).join('');
}

saveBtn.addEventListener('click', () => {
  const name = projInput.value.trim() || 'untitled';
  const projects = readProjects();
  projects[name] = editor.value;
  writeProjects(projects);
  refreshLoadList();
  loadSel.value = name;
  showToast(`Saved: ${name}`);
});

loadSel.addEventListener('change', () => {
  const name = loadSel.value;
  if (!name) return;
  const projects = readProjects();
  if (projects[name]) {
    editor.value = projects[name];
    projInput.value = name;
    run();
    showToast(`Loaded: ${name}`);
  }
});

// ----- Download -----
dlBtn.addEventListener('click', () => {
  const blob = new Blob([editor.value], { type: 'text/javascript' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (projInput.value.trim() || 'game') + '.js';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

// ----- Run + Tab + shortcuts -----
runBtn.addEventListener('click', run);

editor.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = editor.selectionStart, en = editor.selectionEnd;
    editor.value = editor.value.substring(0, s) + '  ' + editor.value.substring(en);
    editor.selectionStart = editor.selectionEnd = s + 2;
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    run();
  }
});

// ----- Help close -----
helpClose.addEventListener('click', () => helpEl.style.display = 'none');

// ----- Boot: read ?template=... from URL -----
function getInitialTemplate() {
  const params = new URLSearchParams(location.search);
  const t = params.get('template');
  if (t && TEMPLATES[t]) return t;
  return 'blank';
}

refreshLoadList();
loadTemplate(getInitialTemplate());
</script>
</body>
</html>
